<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Restablecer Contraseña - Stage Designer</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <img src="/images/logo.png" alt="Logo" class="logo-img">
    </div>
    <ul class="nav-links">
      <li><a href="/stageplot.html">Stage Plot</a></li>
      <li><a href="/equipos.html">Equipos</a></li>
      <li><a href="/login.html">Login</a></li>
    </ul>
  </nav>
  <main class="content">
    <section class="reset-section">
      <h1>Restablecer Contraseña</h1>
      <form id="resetForm" class="form">
        <label for="resetPassword">Nueva contraseña</label>
        <input type="password" id="resetPassword" name="resetPassword" required />
        <button type="submit">Cambiar contraseña</button>
      </form>
      <div id="resetResult"></div>
      <p class="login-link"><a href="/login.html">Volver a Login</a></p>
    </section>
  </main>
  <script src="/js/reset.js"></script>
</body>
</html>
